    <script>
      window.addEventListener("DOMContentLoaded", function () {
        Array.from(document.body.children).forEach(function (node) {

            return;
          }

          var style = window.getComputedStyle(node);
          var rect = node.getBoundingClientRect();
          var looksLikeBrokenTopBar =
            (node.id === "scroll-progress-bar" ||
              (style.position === "fixed" &&
                rect.top <= 4 &&
                rect.height <= 6 &&
                rect.width >= window.innerWidth * 0.15 &&

                  style.backgroundColor !== "rgba(0, 0, 0, 0)")));

          if (looksLikeBrokenTopBar) {
            node.remove();

          var startY = window.scrollY;
          var nextSection = document.querySelector("#demos, #process, section:nth-of-type(2)");
          var targetY = nextSection
            ? Math.max(nextSection.getBoundingClientRect().top + window.scrollY + 24, startY + 482)
            : startY + Math.max(window.innerHeight, 704);
          var distance = Math.max(targetY - startY, Math.max(window.innerHeight * 0.9, 624));
          var duration = 700;
          var startTime = null;

          var easeInOutCubic = function (t) {
            return t < 0.5
              ? 4 * t * t * t
              : 1 - Math.pow(-2 * t + 2, 3) / 2;
          };

          var animateScroll = function (timestamp) {
            if (!startTime) {
              startTime = timestamp;
            }

            var elapsed = timestamp - startTime;
            var progress = Math.min(elapsed / duration, 1);
            var eased = easeInOutCubic(progress);

            window.scrollTo({
              top: startY + distance * eased,
              behavior: "auto",
            });

            if (progress < 1) {
              window.requestAnimationFrame(animateScroll);
            }
          };

          window.requestAnimationFrame(animateScroll);
        });

        document.body.appendChild(button);

        var syncVisibility = function () {
          button.classList.toggle("is-hidden", window.scrollY > 220);
        };

        syncVisibility();
        window.addEventListener("scroll", syncVisibility, { passive: true });

            '<div style="position:relative;padding:14px;border-radius:32px;border:1px solid rgba(255,255,255,0.09);background:linear-gradient(180deg, rgba(19,19,22,0.98), rgba(10,10,12,0.98));box-shadow:inset 0 1px 0 rgba(255,255,255,0.05), 0 28px 90px rgba(0,0,0,0.34);">' +

            '  <div style="position:absolute;inset:0;background:linear-gradient(180deg, rgba(255,255,255,0.03) 0 74px, rgba(0,0,0,0.12) 74px 100%), radial-gradient(circle at 75% 82%, rgba(190,214,86,0.14), transparent 24%);"></div>' +
            '  <div style="position:absolute;left:18px;right:18px;top:18px;z-index:3;display:flex;align-items:center;justify-content:space-between;padding:18px 20px;border-radius:22px 22px 0 0;background:rgba(255,255,255,0.98);color:#2f6a32;">' +
            '    <div style="display:inline-flex;align-items:center;gap:11px;font:800 14px/1 Inter,sans-serif;"><span style="width:19px;height:19px;border-radius:999px;border:2px solid #2f6a32;display:inline-block;position:relative;"></span><span>San Jose Landscaping</span></div>' +

            '    <div style="display:inline-flex;align-items:center;padding:9px 14px;border-radius:999px;background:rgba(47,106,50,.92);font:800 11px/1 Inter,sans-serif;letter-spacing:.14em;text-transform:uppercase;">San Jose\'s #1 Landscaper</div>' +
            '    <div style="margin-top:18px;font:800 60px/.9 Outfit,sans-serif;letter-spacing:-.055em;text-shadow:0 8px 30px rgba(0,0,0,.18);">Transform Your Yard Into Something <span style="color:#7bb35a;">Beautiful</span></div>' +
            '    <div style="margin-top:18px;max-width:420px;color:rgba(255,255,255,.95);font:500 14px/1.6 Inter,sans-serif;text-shadow:0 4px 18px rgba(0,0,0,.16);">Professional, reliable, and affordable landscaping services tailored to the San Jose climate.</div>' +

            '  </div>' +
            '<div style="position:relative;z-index:3;display:flex;align-items:flex-start;justify-content:space-between;gap:24px;padding:18px 6px 6px;">' +
            '  <div style="min-width:0;"><div style="display:inline-flex;align-items:center;margin-bottom:14px;padding:7px 13px;border-radius:999px;background:#4f46e5;color:#fff;font:800 10px/1 Inter,sans-serif;letter-spacing:.08em;text-transform:uppercase;">Service / Local</div><h3 style="margin:0 0 10px;color:#fff;font:800 34px/1 Outfit,sans-serif;letter-spacing:-.03em;">San Jose Landscaping</h3><p style="margin:0;color:rgba(255,255,255,.42);font:500 16px/1.5 Inter,sans-serif;">Client-facing landscaping demo for the San Jose market.</p></div>' +
            '  <div style="display:inline-flex;align-items:center;justify-content:center;width:52px;height:52px;border-radius:999px;background:rgba(255,255,255,.1);color:#fff;flex:0 0 auto;margin-top:auto;"><svg viewBox="0 0 24 24" width="18" height="18" fill="none" xmlns="http://www.w3.org/2000/svg"><path d="M14 5H19V10" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/><path d="M10 14L19 5" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/><path d="M19 14V18C19 18.5304 18.7893 19.0391 18.4142 19.4142C18.0391 19.7893 17.5304 20 17 20H6C5.46957 20 4.96086 19.7893 4.58579 19.4142C4.21071 19.0391 4 18.5304 4 18V7C4 6.46957 4.21071 5.96086 4.58579 5.58579C4.96086 5.21071 5.46957 5 6 5H10" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/></svg></div>' +
